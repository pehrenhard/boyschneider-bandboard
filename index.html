
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAND BOARD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- GATE -->
  <div id="gate" class="gate">
    <div class="gate-inner">
      <div class="gate-title">BAND BOARD</div>
      <div class="gate-sub">enter access code</div>
      <input type="password" id="gateInput" placeholder="_ _ _ _ _ _" autocomplete="off" />
      <button id="gateBtn">ENTER</button>
      <div id="gateError" class="gate-error"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <header class="header">
      <div class="header-left">
        <div class="header-title">BAND BOARD</div>
        <div id="userChip" class="user-chip"></div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="projects">PROJECTS</button>
        <button class="tab" data-tab="moodboard">MOOD BOARD</button>
        <button class="tab" data-tab="notes">NOTES</button>
        <button class="tab" data-tab="archive">ARCHIVE</button>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="reloadBtn" title="Hard reload">↻</button>
        <button class="icon-btn" id="lockBtn" title="Lock">⏻</button>
      </div>
    </header>

    <!-- PROJECTS TAB -->
    <section id="tab-projects" class="tab-content active">
      <div class="toolbar">
        <button id="addProjectBtn" class="btn-primary">+ NEW PROJECT</button>
      </div>
      <div class="filter-bar">
        <label>SORT</label>
        <select id="sortProjects">
          <option value="created">Date Created</option>
          <option value="deadline">Deadline</option>
          <option value="priority">Priority</option>
          <option value="name">Name</option>
        </select>
        <label>PRIORITY</label>
        <select id="filterPriority">
          <option value="all">All</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="viewGrid" title="Grid view">⊞</button>
          <button class="view-btn" id="viewList" title="List view">☰</button>
        </div>
      </div>
      <div id="projectList" class="project-list"></div>
    </section>

    <!-- MOOD BOARD TAB -->
    <section id="tab-moodboard" class="tab-content hidden">
      <div class="toolbar">
        <button id="addCardBtn" class="btn-primary">+ ADD CARD</button>
      </div>
      <div id="moodGrid" class="mood-grid"></div>
    </section>

    <!-- NOTES TAB -->
    <section id="tab-notes" class="tab-content hidden">
      <div class="toolbar">
        <button id="addNoteBtn" class="btn-primary">+ NEW NOTE</button>
      </div>
      <div id="noteGrid" class="mood-grid"></div>
    </section>

    <!-- ARCHIVE TAB -->
    <section id="tab-archive" class="tab-content hidden">
      <div class="archive-header">
        <div class="archive-section-title">ARCHIVED PROJECTS</div>
      </div>
      <div id="archiveProjectList" class="project-list"></div>
      <div class="archive-header" style="margin-top:16px;">
        <div class="archive-section-title">ARCHIVED MOOD CARDS</div>
      </div>
      <div id="archiveMoodList" class="mood-grid"></div>
    </section>

    <!-- PROJECT MODAL -->
    <div id="projectModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <span id="modalProjectTitle" class="modal-title">PROJECT</span>
          <button class="modal-close" id="closeProjectModal">✕</button>
        </div>
        <div class="modal-body">

          <!-- VIEW MODE -->
          <div id="projectViewMode">
            <div class="view-field">
              <div class="view-label">PROJECT</div>
              <div id="viewProjectName" class="view-value view-name"></div>
            </div>
            <div class="view-row">
              <div class="view-field">
                <div class="view-label">DEADLINE</div>
                <div id="viewProjectDeadline" class="view-value"></div>
              </div>
              <div class="view-field">
                <div class="view-label">PRIORITY</div>
                <div id="viewProjectPriority" class="view-value"></div>
              </div>
            </div>
            <div class="view-field">
              <div class="view-label">DESCRIPTION</div>
              <div id="viewProjectDesc" class="view-value"></div>
            </div>
            <div class="view-field">
              <div class="view-label">PEOPLE</div>
              <div id="viewProjectPeople" class="view-value"></div>
            </div>
          </div>

          <!-- EDIT MODE -->
          <div id="projectEditMode" class="hidden">
            <div class="field-group">
              <label>Project Name</label>
              <input type="text" id="editProjectName" placeholder="e.g. New EP Recording" />
            </div>
            <div class="field-row">
              <div class="field-group">
                <label>Deadline</label>
                <input type="date" id="editProjectDeadline" />
              </div>
              <div class="field-group">
                <label>Priority</label>
                <select id="editProjectPriority">
                  <option value="low">LOW</option>
                  <option value="medium" selected>MEDIUM</option>
                  <option value="high">HIGH</option>
                  <option value="critical">CRITICAL</option>
                </select>
              </div>
            </div>
            <div class="field-group">
              <label>Description</label>
              <textarea id="editProjectDesc" placeholder="What's this project about?" rows="2"></textarea>
            </div>
            <div class="field-group">
              <label>People</label>
              <div class="people-select" id="editProjectPeople">
                <button type="button" class="person-chip chip-bo" data-person="BO">BO</button>
                <button type="button" class="person-chip chip-mk" data-person="MK">MK</button>
                <button type="button" class="person-chip chip-mg" data-person="MG">MG</button>
              </div>
            </div>
            <div class="field-group">
              <label>Colour Label</label>
              <div class="colour-picker" id="editProjectColour">
                <div class="colour-dot none selected" data-colour=""></div>
                <div class="colour-dot" style="background:#c0392b" data-colour="#c0392b"></div>
                <div class="colour-dot" style="background:#e67e22" data-colour="#e67e22"></div>
                <div class="colour-dot" style="background:#e8c84a" data-colour="#e8c84a"></div>
                <div class="colour-dot" style="background:#4a7c59" data-colour="#4a7c59"></div>
                <div class="colour-dot" style="background:#1abc9c" data-colour="#1abc9c"></div>
                <div class="colour-dot" style="background:#3a7bd5" data-colour="#3a7bd5"></div>
                <div class="colour-dot" style="background:#8e44ad" data-colour="#8e44ad"></div>
                <div class="colour-dot" style="background:#e91e8c" data-colour="#e91e8c"></div>
              </div>
            </div>
          </div>

          <!-- TASKS (always editable) -->
          <div class="tasks-section">
            <div class="tasks-header">
              <span>TASKS</span>
              <button id="addTaskBtn" class="btn-small">+ ADD</button>
            </div>
            <div id="taskList" class="task-list"></div>
          </div>
        </div>
        <div class="modal-footer">
          <div class="modal-footer-left">
            <button id="archiveProjectBtn" class="btn-muted">ARCHIVE</button>
          </div>
          <div class="modal-footer-right">
            <button id="editProjectBtn" class="btn-outline hidden">EDIT</button>
            <button id="saveProjectBtn" class="btn-primary">SAVE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MOOD MODAL -->
    <div id="moodModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">MOOD CARD</span>
          <button class="modal-close" id="closeMoodModal">✕</button>
        </div>
        <div class="modal-body">
          <div class="field-group">
            <label>Title</label>
            <input type="text" id="moodTitle" placeholder="e.g. Album Artwork Ref" />
          </div>
          <div class="field-group">
            <label>Text / Notes</label>
            <textarea id="moodText" placeholder="Write anything..." rows="3"></textarea>
          </div>
          <div class="field-group">
            <label>Image URL</label>
            <input type="url" id="moodImage" placeholder="https://..." />
            <span class="field-hint">Paste a direct image link</span>
          </div>
          <div class="field-group">
            <label>Audio URL</label>
            <input type="url" id="moodAudio" placeholder="https://... (.mp3, .ogg, .wav, or SoundCloud)" />
            <span class="field-hint">Direct audio file or SoundCloud embed link</span>
          </div>
          <div class="field-group">
            <label>Tag / Category</label>
            <input type="text" id="moodTag" placeholder="e.g. artwork, sound ref, lyrics..." />
          </div>
          <div class="field-group">
            <label>Colour Label</label>
            <div class="colour-picker" id="editMoodColour">
              <div class="colour-dot none selected" data-colour=""></div>
              <div class="colour-dot" style="background:#c0392b" data-colour="#c0392b"></div>
              <div class="colour-dot" style="background:#e67e22" data-colour="#e67e22"></div>
              <div class="colour-dot" style="background:#e8c84a" data-colour="#e8c84a"></div>
              <div class="colour-dot" style="background:#4a7c59" data-colour="#4a7c59"></div>
              <div class="colour-dot" style="background:#1abc9c" data-colour="#1abc9c"></div>
              <div class="colour-dot" style="background:#3a7bd5" data-colour="#3a7bd5"></div>
              <div class="colour-dot" style="background:#8e44ad" data-colour="#8e44ad"></div>
              <div class="colour-dot" style="background:#e91e8c" data-colour="#e91e8c"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div class="modal-footer-left">
            <button id="archiveMoodBtn" class="btn-muted hidden">ARCHIVE</button>
          </div>
          <div class="modal-footer-right">
            <button id="saveMoodBtn" class="btn-primary">SAVE CARD</button>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTE MODAL -->
    <div id="noteModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">NOTE</span>
          <button class="modal-close" id="closeNoteModal">✕</button>
        </div>
        <div class="modal-body">
          <div class="field-group">
            <label>Title</label>
            <input type="text" id="noteTitle" placeholder="e.g. Verse ideas, Meeting notes..." />
          </div>
          <div class="field-group">
            <label>Tag</label>
            <input type="text" id="noteTag" placeholder="e.g. lyrics, admin, ideas..." />
          </div>
          <div class="field-group">
            <label>Colour Label</label>
            <div class="colour-picker" id="editNoteColour">
              <div class="colour-dot none selected" data-colour=""></div>
              <div class="colour-dot" style="background:#c0392b" data-colour="#c0392b"></div>
              <div class="colour-dot" style="background:#e67e22" data-colour="#e67e22"></div>
              <div class="colour-dot" style="background:#e8c84a" data-colour="#e8c84a"></div>
              <div class="colour-dot" style="background:#4a7c59" data-colour="#4a7c59"></div>
              <div class="colour-dot" style="background:#1abc9c" data-colour="#1abc9c"></div>
              <div class="colour-dot" style="background:#3a7bd5" data-colour="#3a7bd5"></div>
              <div class="colour-dot" style="background:#8e44ad" data-colour="#8e44ad"></div>
              <div class="colour-dot" style="background:#e91e8c" data-colour="#e91e8c"></div>
            </div>
          </div>
          <div class="field-group">
            <label>Content</label>
            <textarea id="noteContent" placeholder="Write freely..." rows="10"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <div class="modal-footer-left">
            <button id="deleteNoteBtn" class="btn-danger hidden">DELETE</button>
          </div>
          <div class="modal-footer-right">
            <button id="saveNoteBtn" class="btn-primary">SAVE NOTE</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
